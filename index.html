<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasty Burger & Pizza - Delivery</title>
    <meta name="description"
        content="Peça suas pizzas, hambúrgueres e bebidas favoritas pelo WhatsApp. Cardápio completo com entrega rápida." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="app-shell">

        <!-- ==================== MENU VIEW ==================== -->
        <div class="view active" id="menu-view">

            <!-- Sticky Header -->
            <header class="header">
                <div class="header-top">
                    <div class="header-info">
                        <button class="btn-icon" aria-label="Voltar">
                            <span class="material-symbols-outlined">arrow_back</span>
                        </button>
                        <div>
                            <h1 class="store-name">Tasty Burger & Pizza</h1>
                            <div class="store-status">
                                <span class="status-dot"></span>
                                <span>Aberto até às 23:30</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Search -->
                <div class="search-wrap">
                    <div class="search-box">
                        <span class="material-symbols-outlined">search</span>
                        <input id="search-input" type="text" placeholder="O que vamos comer hoje?" autocomplete="off" />
                    </div>
                </div>

                <!-- Categories -->
                <div class="categories no-scrollbar" id="categories"></div>
            </header>

            <!-- Menu Content -->
            <main class="pb-safe" id="menu-container"></main>
        </div>

        <!-- ==================== CHECKOUT VIEW ==================== -->
        <div class="view" id="checkout-view">

            <!-- Checkout Header -->
            <header class="checkout-header">
                <button class="btn-icon" onclick="backToMenu()" aria-label="Voltar">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h1>Meu Carrinho</h1>
            </header>

            <main class="checkout-body">
                <!-- Cart Items -->
                <section id="cart-items"></section>

                <!-- Delivery Address -->
                <section class="checkout-section">
                    <div class="checkout-section-title">
                        <span class="material-symbols-outlined">location_on</span>
                        Endereço de Entrega
                    </div>
                    <div class="form-grid">
                        <div class="form-group full">
                            <label class="form-label" for="input-nome">Nome</label>
                            <input id="input-nome" class="form-input" type="text" placeholder="Seu nome" />
                        </div>
                        <div class="form-group full">
                            <label class="form-label" for="input-rua">Rua</label>
                            <input id="input-rua" class="form-input" type="text" placeholder="Nome da rua" />
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="input-numero">Número</label>
                            <input id="input-numero" class="form-input" type="text" placeholder="123" />
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="input-bairro">Bairro</label>
                            <input id="input-bairro" class="form-input" type="text" placeholder="Seu bairro" />
                        </div>
                    </div>
                </section>

                <!-- Payment Methods -->
                <section class="checkout-section">
                    <div class="checkout-section-title">
                        <span class="material-symbols-outlined">payments</span>
                        Forma de Pagamento
                    </div>
                    <div class="payment-options">
                        <!-- Dinheiro -->
                        <div class="payment-option selected" data-payment="dinheiro" data-label="Dinheiro"
                            onclick="selectPayment(this)">
                            <div class="payment-radio">
                                <div class="payment-radio-inner"></div>
                            </div>
                            <span class="payment-label">Dinheiro</span>
                            <span class="material-symbols-outlined payment-icon">payments</span>
                        </div>
                        <div id="change-toggle-container"
                            style="display: block; margin-top: 0.5rem; background: var(--bg-white); border-radius: var(--radius-xl); border: 2px solid var(--border-light); padding: 0.75rem;">
                            <div class="toggle-row"
                                style="margin: 0; background: transparent; border: none; padding: 0; justify-content: space-between;">
                                <div class="toggle-row-text">
                                    <p style="font-weight: 600; font-size: 0.875rem;">Precisa de troco?</p>
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="toggle-change"
                                        onchange="toggleChangeInput(this.checked)" />
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div id="change-field" style="display: none; margin-top: 0.75rem;">
                                <input id="input-change" class="form-input" type="text"
                                    placeholder="Troco para quanto? Ex: R$ 50,00" />
                            </div>
                        </div>
                        <!-- Cartão -->
                        <div class="payment-option" data-payment="cartao" data-label="Cartão na Entrega"
                            onclick="selectPayment(this)">
                            <div class="payment-radio">
                                <div class="payment-radio-inner"></div>
                            </div>
                            <span class="payment-label">Cartão na Entrega</span>
                            <span class="material-symbols-outlined payment-icon">credit_card</span>
                        </div>
                        <!-- PIX -->
                        <div class="payment-option" data-payment="pix" data-label="PIX" onclick="selectPayment(this)">
                            <div class="payment-radio">
                                <div class="payment-radio-inner"></div>
                            </div>
                            <span class="payment-label">PIX</span>
                            <span class="material-symbols-outlined payment-icon">qr_code_2</span>
                        </div>
                    </div>
                </section>

                <!-- Price Summary -->
                <section class="price-summary">
                    <div class="price-row">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">R$ 0,00</span>
                    </div>
                    <div class="price-row">
                        <span>Taxa de Entrega</span>
                        <span id="checkout-delivery">R$ 5,00</span>
                    </div>
                    <div class="price-total">
                        <span>Total</span>
                        <span class="total-value" id="checkout-total">R$ 5,00</span>
                    </div>
                </section>
            </main>

            <!-- WhatsApp Button -->
            <div class="checkout-footer">
                <button class="btn-whatsapp" onclick="sendWhatsApp()">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .018 5.396.015 12.03c0 2.12.554 4.189 1.605 6.04L0 24l6.104-1.602a11.834 11.834 0 005.937 1.598h.005c6.637 0 12.032-5.396 12.035-12.031a11.815 11.815 0 00-3.628-8.502" />
                    </svg>
                    Finalizar via WhatsApp
                </button>
            </div>
        </div>

    </div>

    <!-- ==================== PRODUCT MODAL ==================== -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div id="modal-content-inner"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- ==================== FLOATING CART BAR ==================== -->
    <div class="cart-bar" id="cart-bar">
        <div class="cart-bar-inner">
            <div class="cart-bar-left">
                <span class="cart-count" id="cart-count">0</span>
                <span class="cart-bar-label">Ver sacola</span>
            </div>
        </div>
    </div>

    <!-- ==================== TOAST ==================== -->
    <div class="toast" id="toast">
        <span class="material-symbols-outlined">check_circle</span>
        <span class="toast-msg"></span>
    </div>

    <!-- JavaScript -->
    <script src="app.js"></script>

</body>

</html>
